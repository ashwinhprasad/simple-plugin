version: '3.8'

services:
  node-dev:
    image: node:24  # You can change the version as needed
    container_name: mcp-sample-node-dev
    network_mode: host
    working_dir: /app
    volumes:
      - .:/app
    stdin_open: true   # Keeps stdin open for interactive sessions
    tty: true          # Allocates a pseudo-TTY
    command: tail -f /dev/null  # Keeps the container running